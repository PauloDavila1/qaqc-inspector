// SUPABASE CLIENT
// ═══════════════════════════════════════════════════════════════════
const SUPA_URL = "https://mnufyvamaydpvyyoqvuv.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1udWZ5dmFtYXlkcHZ5eW9xdnV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODY2NzgsImV4cCI6MjA5Mjk2MjY3OH0.Mr8573v5tTgCwtZ45ULLu0mvOMzjYvozkaErhs6Hhj0";

// Minimal Supabase REST client — no npm needed
const supa = {
  // Auth
  auth: {
    signIn: async (email, password) => {
      const r = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPA_KEY
        },
        body: JSON.stringify({
          email,
          password
        })
      });
      return r.json();
    },
    signOut: async token => {
      await fetch(`${SUPA_URL}/auth/v1/logout`, {
        method: "POST",
        headers: {
          "apikey": SUPA_KEY,
          "Authorization": `Bearer ${token}`
        }
      });
    },
    getUser: async token => {
      const r = await fetch(`${SUPA_URL}/auth/v1/user`, {
        headers: {
          "apikey": SUPA_KEY,
          "Authorization": `Bearer ${token}`
        }
      });
      return r.json();
    },
    refresh: async refreshToken => {
      const r = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=refresh_token`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPA_KEY
        },
        body: JSON.stringify({
          refresh_token: refreshToken
        })
      });
      return r.json();
    },
    inviteByEmail: async (token, email, role) => {
      // Calls our Edge Function which uses service_role to send the invite email
      const r = await fetch(`${SUPA_URL}/functions/v1/invite-user`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`,
          "apikey": SUPA_KEY
        },
        body: JSON.stringify({
          email,
          role
        })
      });
      return r.json();
    }
  },
  // Generic table operations
  from: table => ({
    select: async (token, filter = "") => {
      const url = filter ? `${SUPA_URL}/rest/v1/${table}?${filter}` : `${SUPA_URL}/rest/v1/${table}?order=updated_at.desc`;
      const r = await fetch(url, {
        headers: {
          "apikey": SUPA_KEY,
          "Authorization": `Bearer ${token}`,
          "Accept": "application/json"
        }
      });
      return r.json();
    },
    upsert: async (token, data) => {
      const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
        method: "POST",
        headers: {
          "apikey": SUPA_KEY,
          "Authorization": `Bearer ${token}`,
          "Content-Type": "application/json",
          "Prefer": "resolution=merge-duplicates,return=representation"
        },
        body: JSON.stringify(data)
      });
      return r.json();
    },
    delete: async (token, id) => {
      await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, {
        method: "DELETE",
        headers: {
          "apikey": SUPA_KEY,
          "Authorization": `Bearer ${token}`
        }
      });
    }
  })
};

// Local session token storage
const session = {
  get: () => {
    try {
      return JSON.parse(localStorage.getItem("qc_sess") || "null");
    } catch {
      return null;
    }
  },
  set: v => {
    try {
      localStorage.setItem("qc_sess", JSON.stringify(v));
    } catch {}
  },
  clear: () => {
    try {
      localStorage.removeItem("qc_sess");
    } catch {}
  }
};

const STATUS_COLORS = {

  let arr = stored;
  if (typeof arr === "string") { try { arr = JSON.parse(arr); } catch { arr = []; } }
  if (!Array.isArray(arr)) arr = [];
  const defaults = ROLE_DEFAULT_PERMS[role] || [];
  return [...new Set([...arr, ...defaults])];
};
const hasPerm = (user, p) => {
  if (user?.role === "Gestor" || user?.role === "Administrador") return true;
  let perms = user?.perms || [];
  if (typeof perms === "string") {
    try {
      perms = JSON.parse(perms);
    } catch {
      perms = [];
    }
  }
  return Array.isArray(perms) && perms.includes(p);
};

// ── Instancia blocos do BASE_TEMPLATE com IDs únicos ──
function instantiateBlocks(docType) {
  const base = BASE_TEMPLATES[docType] || BASE_TEMPLATES.R;
  return base.map(b => ({
    ...b,
    id: "b_" + b.key + "_" + uid(),
    config: JSON.parse(JSON.stringify(b.config))

// CSS for printed document
const PDF_CSS = `
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;background:#fff}
  body{font-family:Arial,Helvetica,sans-serif;font-size:11px;color:#1E293B}
  @page{size:A4;margin:15mm 15mm 18mm}
  .page{width:100%;padding:12px 14px 20px;position:relative}
  .hdr{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #4A7EC7;padding-bottom:8px;margin-bottom:12px;gap:8px}
  .hdr-logo img{height:38px;width:auto;flex-shrink:0}
  .hdr-center{flex:1;padding:0 10px;border-left:1px solid #E2E8F0;border-right:1px solid #E2E8F0;margin:0 8px;min-width:0;overflow:hidden}
  .hdr-center .dn{font-size:14px;font-weight:800;color:#1E3A5F;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hdr-center .nm{font-size:10px;color:#475569;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hdr-center .pj{font-size:9px;color:#9E9E9E;margin-top:2px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hdr-right{text-align:right;min-width:72px;flex-shrink:0}
  .hdr-right .rv{font-size:13px;font-weight:800;color:#4A7EC7}
  .hdr-right .dt{font-size:9px;color:#9E9E9E;margin-top:1px}
  .sec{font-size:10px;font-weight:700;color:#fff;background:#1E3A5F;padding:4px 8px;margin:10px 0 5px;letter-spacing:.3px;text-transform:uppercase}
  .id-t{width:100%;border-collapse:collapse;margin-bottom:8px}
  .id-t td{padding:4px 7px;border:1px solid #E2E8F0;font-size:10px}
  .id-t td.lb{font-weight:700;color:#475569;width:110px;background:#F8FAFC;white-space:nowrap}
  table.dt{width:100%;border-collapse:collapse;margin-bottom:8px;table-layout:fixed}
  table.dt th{background:#1E3A5F;color:#fff;padding:5px 6px;text-align:left;font-size:9px;font-weight:700;border:1px solid #1E3A5F;overflow:hidden}
  table.dt td{padding:4px 6px;border:1px solid #E2E8F0;font-size:10px;vertical-align:top;word-break:break-word;overflow-wrap:break-word}
  table.dt tr:nth-child(even) td{background:#F8FAFC}
  .pit-i{border:1px solid #BFDBFE;border-radius:3px;padding:5px 8px;margin-bottom:4px;background:#EFF6FF}
  .bdg{display:inline-block;padding:1px 6px;border-radius:3px;font-size:8px;font-weight:700;text-transform:uppercase;white-space:nowrap}
  .sig-area{margin-top:14px;padding-top:10px;border-top:2px solid #E2E8F0;display:flex;justify-content:space-around;gap:14px}
  .sig-box{text-align:center;flex:1;min-width:0}
  .sig-line{border-bottom:1px solid #1E3A5F;height:46px;margin-bottom:4px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:2px}
  .sig-nm{font-size:10px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sig-rl{font-size:8px;color:#9E9E9E;margin-top:1px}
  .photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
  .photo-item{border:1px solid #E2E8F0;border-radius:3px;overflow:hidden}
  .photo-item img{width:100%;max-height:100px;object-fit:cover;display:block}
  .photo-cap{padding:2px 5px;font-size:8px;color:#475569;background:#F8FAFC}
  .footer{margin-top:14px;padding-top:3px;border-top:1px solid #E2E8F0;display:flex;justify-content:space-between;font-size:8px;color:#9E9E9E}
  @media print{
    .footer{position:fixed;bottom:6mm;left:0;right:0;margin-top:0;padding-top:3px}
  }
`;
function bdg(text, color) {
  return `<span class="bdg" style="background:${color}22;color:${color};border:1px solid ${color}44">${escapeHtml(text || "—")}</span>`;
}
function blockToPdfHtml(block, data) {
  const fv = v => escapeHtml(v || "—");
  const sc = s => s === "Conforme" ? "#10B981" : s === "Não conforme" ? "#EF4444" : "#9E9E9E";
